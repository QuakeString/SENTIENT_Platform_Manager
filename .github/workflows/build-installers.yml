name: build-installers

# Builds the Windows installer. Run manually (Actions -> build-installers ->
# Run workflow, pick debug/release) or on a version tag (debug by default —
# fast, for iteration; trigger a manual release build for a shippable installer).
on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile (debug = fast, release = optimized/shippable)"
        type: choice
        options: [debug, release]
        default: debug
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Caches the third-party dependency builds for src-tauri (tauri, webview
      # bindings, etc.) keyed on Cargo.lock — the bulk of a cold build.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Prebuilt Tauri CLI from npm — downloads the cargo-tauri binary in
      # seconds instead of compiling `cargo install tauri-cli` (~5-8 min).
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Tauri CLI (prebuilt)
        run: npm install -g @tauri-apps/cli@^2

      - name: Build installer
        shell: bash
        run: |
          if [ "${{ github.event.inputs.profile }}" = "release" ]; then
            echo "Building RELEASE installer"
            tauri build
            echo "BUNDLE_DIR=release" >> "$GITHUB_ENV"
          else
            echo "Building DEBUG installer (fast iteration)"
            tauri build --debug
            echo "BUNDLE_DIR=debug" >> "$GITHUB_ENV"
          fi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          if-no-files-found: error
          path: |
            src-tauri/target/${{ env.BUNDLE_DIR }}/bundle/**/*.exe
            src-tauri/target/${{ env.BUNDLE_DIR }}/bundle/**/*.msi
